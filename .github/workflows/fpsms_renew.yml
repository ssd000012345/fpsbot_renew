name: fps.ms 每日续期

on:
  schedule:
    # 每天 UTC 02:00 执行（北京时间 10:00），可按需修改
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      debug_mode:
        description: '调试模式（打印更多日志）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  renew:
    name: 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      actions: write

    steps:
      # ── 1. 拉取仓库 ─────────────────────────────────────────────
      - name: 拉取仓库
        uses: actions/checkout@v4

      # ── 2. 安装 Python ──────────────────────────────────────────
      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      # ── 3. 安装依赖 ──────────────────────────────────────────────
      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # seleniumbase 会自动管理 chromedriver，无需额外安装

      # ── 4. 安装系统依赖（Chrome 运行时 + 录屏工具） ──────────────
      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 libxss1 libasound2t64 libatk-bridge2.0-0 \
            libgtk-3-0 libgbm1 libxkbcommon0 \
            fonts-wqy-zenhei fonts-noto-cjk \
            jq bc curl \
            xvfb x11-utils \
            ffmpeg

      # ── 5. 启用 Cloudflare WARP ──────────────────────────────────
      - name: 启用 Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual      # IPv4 + IPv6
          mode: client

      # ── 6. 修复 DNS（WARP 可能覆盖 DNS） ─────────────────────────
      - name: 修复 DNS 配置
        run: |
          echo "[INFO] 修复 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          printf 'nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1\n' \
            | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2

          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo

          echo "[INFO] WARP 状态:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace \
            | grep -E 'ip=|warp=|loc=' || true

          echo "[INFO] DNS 解析测试:"
          nslookup panel.fps.ms 1.1.1.1 || echo "[WARN] 解析失败，继续"

      # ── 7. 运行续期脚本（含录屏） ─────────────────────────────────
      - name: 运行 fps.ms 续期脚本
        id: run_renew
        env:
          FPSMS_DISCORD_TOKEN: ${{ secrets.FPSMS_DISCORD_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISPLAY: ':99'
        run: |
          mkdir -p screenshots recordings

          # 启动虚拟显示（1280x800，24位色深）
          Xvfb :99 -screen 0 1280x800x24 &
          XVFB_PID=$!
          sleep 2
          echo "[INFO] Xvfb 已启动 (PID=$XVFB_PID)"

          # 启动 ffmpeg 录屏（录制虚拟显示内容）
          # -r 10: 10帧/秒（够用且文件小）
          # -video_size: 与 Xvfb 分辨率一致
          # -preset ultrafast: 编码速度优先（CI 环境 CPU 有限）
          ffmpeg -y \
            -f x11grab \
            -r 10 \
            -video_size 1280x800 \
            -i :99 \
            -vcodec libx264 \
            -preset ultrafast \
            -crf 30 \
            recordings/session.mp4 \
            2>recordings/ffmpeg.log &
          FFMPEG_PID=$!
          echo "[INFO] ffmpeg 录屏已启动 (PID=$FFMPEG_PID)"
          sleep 1

          echo "=============================="
          echo " 开始执行 fps.ms 续期脚本"
          echo " 时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=============================="

          python renew.py 2>&1 | tee renew.log
          EXIT_CODE=${PIPESTATUS[0]}

          echo ""
          echo "=============================="
          echo " 脚本退出码: $EXIT_CODE"
          echo "=============================="

          # 优雅停止 ffmpeg（发送 q 让它正常写入结尾并关闭文件）
          echo "[INFO] 停止录屏..."
          kill -INT $FFMPEG_PID 2>/dev/null || true
          wait $FFMPEG_PID 2>/dev/null || true

          # 停止 Xvfb
          kill $XVFB_PID 2>/dev/null || true

          # 检查录像文件
          if [ -f recordings/session.mp4 ]; then
            SIZE=$(du -sh recordings/session.mp4 | cut -f1)
            echo "[INFO] 录像文件: recordings/session.mp4 ($SIZE)"
          else
            echo "[WARN] 录像文件未生成，检查 recordings/ffmpeg.log"
            cat recordings/ffmpeg.log || true
          fi

          exit $EXIT_CODE

      # ── 8. 上传截图 ───────────────────────────────────────────────
      - name: 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renew-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 3
          if-no-files-found: ignore

      # ── 9. 上传录屏视频 ────────────────────────────────────────────
      - name: 上传录屏视频
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renew-recording-${{ github.run_number }}
          path: recordings/
          retention-days: 3
          if-no-files-found: ignore

      # ── 10. 清理旧的 workflow 运行记录 ────────────────────────────
      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
